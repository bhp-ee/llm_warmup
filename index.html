<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>LLM & AI Knowledge Archive</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>

    <!-- Enhanced Navigation Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📚 Navigation</h2>
            <div class="nav-controls">
                <button class="collapse-all-btn" id="collapseAllBtn">📋 Expand All</button>
                <button class="nav-toggle-btn" id="navToggleBtn" title="Minimize navigation">☰</button>
            </div>
        </div>
        <nav class="toc enhanced-nav" id="tableOfContents">
            <!-- TOC auto-generated by script.js from config.js -->
        </nav>
    </aside>

    <!-- Main Content - Auto-generated from config.js -->
    <main class="main-content">
        <header class="document-header" id="documentHeader">
            <!-- Header auto-generated by script.js from config.js -->
        </header>

        <div id="contentContainer">
            <!-- Sections auto-generated by script.js from config.js -->
        </div>

        <footer class="document-footer">
            <p>This is a living document. Feel free to add, modify, or update content as needed.</p>
        </footer>
    </main>

    <!-- Load configuration first, then main script -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
